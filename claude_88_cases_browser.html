const cats = ['全部', ...new Set(data.map(d => d.cat))];
const diffs = ['全部', '入門', '進階', '專業'];
let selCat = '全部', selDiff = '全部', q = '';

function renderFilters() {
  document.getElementById('cat-filters').innerHTML = cats.map(c =>
    `<button class="filter-btn${selCat===c?' active':''}" onclick="selCat='${c}';render()">${c}</button>`
  ).join('');
  document.getElementById('diff-filters').innerHTML = diffs.map(d =>
    `<button class="diff-btn${selDiff===d?' active-'+d:''}" onclick="selDiff='${d}';render()">${d}</button>`
  ).join('');
}

function render() {
  q = document.getElementById('search').value.toLowerCase();
  selCat = selCat; selDiff = selDiff;
  renderFilters();
  const filtered = data.filter(item => {
    if (selCat !== '全部' && item.cat !== selCat) return false;
    if (selDiff !== '全部' && item.diff !== selDiff) return false;
    if (q && !item.t.toLowerCase().includes(q) && !item.d.toLowerCase().includes(q)) return false;
    return true;
  });
  document.getElementById('count').textContent = `顯示 ${filtered.length} 個案例`;
  document.getElementById('grid').innerHTML = filtered.map(item => `
    <div class="card">
      <div class="card-top">
        <div class="card-title">${item.t}</div>
        <div class="card-num">#${item.n}</div>
      </div>
      <div class="card-desc">${item.d}</div>
      <div class="card-footer">
        <span class="badge badge-cat">${item.cat}</span>
        <span class="badge badge-${item.diff}">${item.diff}</span>
      </div>
    </div>
  `).join('');
}

render();
</script>
